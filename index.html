<!DOCTYPE html>
<html>
<head>
<title>Testing Practice for CSS</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<header id="header">
<h1>Testing Practice for CSS</h1>
</header>

<!-- ID SELECTOR PRACTICE -->
<section class="section">
<h2>ID Selector</h2>

<input id="username" placeholder="Username">
<input id="email" placeholder="Email">
<input id="password" placeholder="Password">

</section>


<!-- CLASS SELECTOR PRACTICE -->
<section class="section">
<h2>Class Selector</h2>

<button class="login-btn">Login</button>
<button class="login-btn">Register</button>
<button class="login-btn">Reset</button>

</section>


<!-- TAG SELECTOR PRACTICE -->
<section class="section">
<h2>Tag Selector (Only 3 Inputs)</h2>

<input placeholder="Input One">
<input placeholder="Input Two">
<input placeholder="Input Three">

</section>


<!-- ATTRIBUTE NAME PRACTICE -->
<section class="section">
<h2>Attribute Selector</h2>

<input type="text" required placeholder="Required Field">
<input type="password" disabled placeholder="Disabled Field">
<input type="email" required placeholder="Email Field">

</section>


<!-- ATTRIBUTE VALUE PRACTICE -->
<section class="section">
<h2>Attribute Value Selector</h2>

<input type="text" name="user">
<input type="text" name="admin">
<input type="text" name="guest">

</section>


<!-- COMBINATOR PRACTICE -->
<section class="section">
<h2>Combinator Selectors</h2>

<div class="parent">

<label>Name</label>
<input placeholder="Child Input">

<label>Email</label>
<input placeholder="Sibling Input">

</div>

</section>


<!-- PSEUDO CLASS PRACTICE -->
<section class="section">
<h2>Pseudo Class Practice</h2>

<ul class="menu">

<li>Dashboard</li>
<li>Users</li>
<li>Reports</li>

</ul>

<label>
<input type="checkbox" checked>
Active
</label>

<label>
<input type="checkbox">
Inactive
</label>

</section>


<footer>
<p>Automation Testing CSS Practice Page</p>
</footer>

</body>
</html>
